<div class="container">
    <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom">
        <div class="col-md-3 mb-2 mb-md-0">
            <a href="/" class="d-inline-flex align-items-center link-body-emphasis text-decoration-none">
                <span class="fs-4">RoadToUniNa</span>
            </a>
        </div>
        <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
            <li>
                <a routerLink="/" class="nav-link px-2">Home</a>
            </li>
            <li>
                <a routerLink="/leaderboard" class="nav-link px-2">Classifiche</a>
            </li>
            <li>
                <a routerLink="/match-history" class="nav-link px-2">Storico Partite</a>
            </li>
        </ul>
        <div class="col-md-3 text-end">
            @if (! this.authService.isUserAuthenticated()) {
                <a routerLink="/login" class="btn btn-outline-primary me-2">Login</a>
                <a routerLink="/signup" class="btn btn-primary">Sign-Up</a>
            } @else {
                <span class="me-4 primary">Ciao {{ this.authService.user() }}!</span>
                <a routerLink="/" (click)="logout()" class="btn btn-primary">Logout</a>
            }
        </div>
    </header>
</div>
